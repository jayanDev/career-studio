name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Stop in-flight runs when a new commit lands on the same branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint + typecheck + build
    runs-on: ubuntu-latest

    # All three checks have to pass for the gate to be green.
    # Build relies on prisma generate which needs DATABASE_URL just to
    # compute the client shape (no actual connection).
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/dummy_ci_db"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/dummy_ci_db"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      AUTH_SECRET: "ci-secret-not-used"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npx eslint .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
